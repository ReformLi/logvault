name: Fetch Logs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call fetch cron endpoint
        run: |
          curl -s -X GET "${{ secrets.VERCEL_DEPLOYMENT_URL }}/api/fetch/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
